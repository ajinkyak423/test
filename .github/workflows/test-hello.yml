name: Echo Hello Every 10 Minutes

on:
  schedule:
    # Runs every 10 minutes
    - cron: '*/10 * * * *'
  
  # (Optional) Allows you to trigger the workflow manually from the GitHub UI
  workflow_dispatch:

jobs:
  say-hello:
    runs-on: ubuntu-latest
    
    steps:
      - name: Print Hello
        run: echo "hello"